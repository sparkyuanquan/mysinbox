name: Build Minimal Sing-Box

on:
  workflow_dispatch:

permissions:
  contents: write  # 必须，赋予写 Release 的权限

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Build sing-box for ARM64
        run: |
          git clone https://github.com/SagerNet/sing-box.git
          cd sing-box
          GOOS=linux GOARCH=arm64 CGO_ENABLED=0 \
          go build -v \
            -trimpath \
            -ldflags="-s -w -buildid=" \
            -tags "with_gvisor,with_openconnect" \
            -o ../sing-box-bin ./cmd/sing-box

      - name: Compress Binary
        run: |
          sudo apt-get update && sudo apt-get install -y upx
          upx --best --lzma sing-box-bin

      # 自动生成 Release 步骤
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.0.0-${{ github.run_number }}
          name: Sing-Box Minimal ARM64 (v1.0.0-${{ github.run_number }})
          body: "随身 Wi-Fi 专属精简版 sing-box 二进制文件"
          files: sing-box-bin
